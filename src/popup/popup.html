<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Full-Length Capture</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 14px; width: 240px;
    font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1c1c22; color: #eaeaf0;
  }
  h1 { font-size: 13px; margin: 0 0 4px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #ff7a18; animation: pulse 1.2s infinite; flex: none; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }
  #count { color: #b7b7c4; margin: 0 0 12px; }
  button {
    display: block; width: 100%; margin-bottom: 8px;
    background: #2a2a33; color: #eaeaf0; border: 1px solid #3a3a45;
    border-radius: 8px; padding: 9px 12px; font-size: 13px; font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #34343f; }
  button:disabled { opacity: .5; cursor: default; }
  #done { background: #ff7a18; color: #1c1c22; border-color: #ff7a18; }
  #done:hover { background: #ff8a35; }
  #status { margin-top: 8px; color: #b7b7c4; min-height: 18px; font-size: 12px; }
  #status.error { color: #ff8f8f; }
  #status.end { color: #7dffb2; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .row label { display: flex; align-items: center; gap: 6px; cursor: pointer; flex: 1; }
  select {
    flex: 1; background: #2a2a33; color: #eaeaf0; border: 1px solid #3a3a45;
    border-radius: 8px; padding: 7px 8px; font-size: 12px;
  }
</style>
</head>
<body>
  <h1><span class="dot"></span>Capturing…</h1>
  <p id="count">0 shots</p>
  <div class="row">
    <label><input type="checkbox" id="auto"> Auto scroll</label>
    <select id="speed" title="Scroll speed">
      <option value="slow">Slow</option>
      <option value="medium" selected>Medium</option>
      <option value="fast">Fast</option>
    </select>
  </div>
  <button id="area">Change area</button>
  <button id="done">Done — make PDF</button>
  <button id="cancel">Cancel</button>
  <p id="status"></p>
  <script type="module" src="popup.js"></script>
</body>
</html>
