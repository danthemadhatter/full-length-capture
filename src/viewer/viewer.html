<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Capture Result</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #15151a; color: #eaeaf0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    header { position: sticky; top: 0; z-index: 10; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      padding: 10px 16px; background: #1c1c22; border-bottom: 1px solid #2d2d36; }
    .title { font-weight: 700; font-size: 14px; margin-right: auto; }
    .meta { font-size: 11px; color: #8a8a98; }
    button { background: #ff7a18; color: #1c1c22; border: 0; border-radius: 7px; padding: 8px 12px; font-weight: 700; cursor: pointer; font-size: 13px; }
    #status { font-size: 12px; color: #9a9aa8; }
    .warnbar { background: #241f16; color: #ffcf8f; font-size: 12px; padding: 8px 16px; border-bottom: 1px solid #6b4f18; display: none; }
    embed, iframe { width: 100%; height: calc(100vh - 52px); border: 0; }
  </style>
</head>
<body>
  <header>
    <span class="title">Full-Length Capture</span>
    <span class="meta" id="meta"></span>
    <span id="status">Loading…</span>
    <button id="dl" disabled>Download</button>
  </header>
  <div class="warnbar" id="warnbar"></div>
  <div id="preview"></div>
  <script type="module" src="viewer.js"></script>
</body>
</html>
